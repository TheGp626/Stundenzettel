<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)"/>
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Stundenzettel"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>Stundennachweis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #ffffff;
  --bg2: #f5f5f4;
  --bg3: #eeede9;
  --text: #1a1a18;
  --text2: #6b6b67;
  --text3: #9b9b97;
  --border: rgba(0,0,0,0.12);
  --border2: rgba(0,0,0,0.22);
  --accent: #185FA5;
  --accent-bg: #E6F1FB;
  --accent-text: #185FA5;
  --danger: #A32D2D;
  --radius: 10px;
  --radius-lg: 14px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a;
    --bg2: #252523;
    --bg3: #2e2e2b;
    --text: #f0efe9;
    --text2: #a0a09a;
    --text3: #6a6a65;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.18);
    --accent: #4a90d9;
    --accent-bg: #0c2a45;
    --accent-text: #7ab8ef;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

/* BOTTOM NAV */
.app { display: flex; flex-direction: column; height: 100%; }
.page { flex: 1; overflow-y: auto; padding: 16px; display: none; }
.page.active { display: block; }
.bottom-nav { display: flex; border-top: 0.5px solid var(--border); background: var(--bg); padding: 8px 0 max(8px, env(safe-area-inset-bottom)); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; border: none; background: none; color: var(--text3); font-size: 10px; padding: 4px; cursor: pointer; }
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 22px; line-height: 1; }

/* TYPOGRAPHY */
h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); margin: 20px 0 8px; }

/* CARDS */
.card { background: var(--bg2); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 12px; border: 0.5px solid var(--border); }
.card-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.card-row:last-child { border-bottom: none; padding-bottom: 0; }
.card-row:first-child { padding-top: 0; }

/* INPUTS */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
.field input, .field select { width: 100%; padding: 10px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 15px; -webkit-appearance: none; }
.field input:focus, .field select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.time-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
input[type="time"] { font-size: 16px; }

/* CHIPS */
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
.chip { padding: 7px 14px; border: 0.5px solid var(--border2); border-radius: 99px; font-size: 13px; cursor: pointer; color: var(--text2); background: var(--bg); transition: all 0.15s; }
.chip.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }

/* DAY ROWS */
.day-row { background: var(--bg2); border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden; border: 0.5px solid var(--border); }
.day-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; cursor: pointer; }
.day-name { font-weight: 600; font-size: 15px; }
.day-date { font-size: 12px; color: var(--text2); }
.day-hours { font-size: 15px; font-weight: 600; color: var(--accent); }
.day-hours.empty { color: var(--text3); font-weight: 400; }
.day-body { padding: 0 16px 14px; border-top: 0.5px solid var(--border); display: none; }
.day-body.open { display: block; }
.day-body .field { margin-top: 12px; margin-bottom: 8px; }

/* TOTAL BAR */
.total-bar { background: var(--accent-bg); border-radius: var(--radius-lg); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 0.5px solid var(--accent); }
.total-bar .label { font-size: 13px; color: var(--accent-text); }
.total-bar .value { font-size: 28px; font-weight: 700; color: var(--accent); }
.total-bar .unit { font-size: 14px; color: var(--accent-text); }

/* BUTTONS */
.btn { display: block; width: 100%; padding: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 15px; font-weight: 500; cursor: pointer; text-align: center; margin-bottom: 10px; }
.btn:active { background: var(--bg3); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:active { opacity: 0.85; }
.btn.danger { color: var(--danger); }

/* HISTORY */
.history-item { display: flex; justify-content: space-between; align-items: center; }
.history-week { font-size: 14px; font-weight: 500; }
.history-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.history-hours { font-size: 18px; font-weight: 600; color: var(--accent); }
.badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 99px; background: var(--bg3); color: var(--text2); }

/* SIGNATURE */
.sig-wrap { border: 0.5px solid var(--border2); border-radius: var(--radius); overflow: hidden; background: var(--bg); margin-top: 6px; position: relative; }
#sigCanvas { display: block; width: 100%; touch-action: none; }
.sig-clear { position: absolute; top: 8px; right: 8px; font-size: 12px; color: var(--text3); background: var(--bg2); border: 0.5px solid var(--border); border-radius: 6px; padding: 3px 8px; cursor: pointer; }

/* TOAST */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 48px 16px; color: var(--text3); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="app">

<!-- PAGE: ERFASSEN -->
<div class="page active" id="page-home">
  <h1>Stundennachweis</h1>
  <p class="subtitle">Lübbert Event Interiors</p>

  <div class="field">
    <label>Name</label>
    <input type="text" id="inp-name" placeholder="Vollständiger Name"/>
  </div>

  <div class="field">
    <label>Woche (Montag)</label>
    <input type="date" id="inp-week"/>
  </div>

  <div class="section-label">Abteilung</div>
  <div class="chips" id="chips-abt">
    <div class="chip" data-val="AL (Aufbauleitung)">AL</div>
    <div class="chip active" data-val="MA für Auf-/Abbau">MA</div>
    <div class="chip" data-val="Floristik">Floristik</div>
    <div class="chip" data-val="Lager">Lager</div>
    <div class="chip" data-val="Stoffe">Stoffe</div>
    <div class="chip" data-val="Tischlerei">Tischlerei</div>
  </div>

  <div class="section-label" style="margin-top:20px">Arbeitstage</div>

  <div id="days-container"></div>

  <div class="total-bar">
    <div>
      <div class="label">Gesamtstunden</div>
    </div>
    <div style="display:flex;align-items:baseline;gap:6px">
      <span class="value" id="total-hours">0</span>
      <span class="unit">h</span>
    </div>
  </div>

  <div class="section-label">Unterschrift (AL)</div>
  <div class="sig-wrap">
    <canvas id="sigCanvas" height="120"></canvas>
    <button class="sig-clear" onclick="clearSig()">löschen</button>
  </div>

  <div style="margin-top:16px">
    <button class="btn primary" onclick="saveWeek()">💾 Woche speichern</button>
    <button class="btn" onclick="exportPDF()">📄 Als PDF exportieren</button>
  </div>
</div>

<!-- PAGE: VERLAUF -->
<div class="page" id="page-history">
  <h1>Verlauf</h1>
  <p class="subtitle">Gespeicherte Wochen</p>
  <div id="history-list"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="navigate('home')" id="nav-home">
    <span class="nav-icon">✏️</span>
    <span>Erfassen</span>
  </button>
  <button class="nav-btn" onclick="navigate('history')" id="nav-history">
    <span class="nav-icon">📋</span>
    <span>Verlauf</span>
  </button>
</nav>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
let selectedAbt = 'MA für Auf-/Abbau';
let sigData = null;

// --- NAVIGATION ---
function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav-'+page).classList.add('active');
  if (page === 'history') renderHistory();
}

// --- DATE HELPERS ---
function getMonday(dateStr) {
  const d = dateStr ? new Date(dateStr) : new Date();
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}
function pad(n) { return String(n).padStart(2,'0'); }
function fmtDate(d) { return pad(d.getDate())+'.'+pad(d.getMonth()+1); }
function fmtDateFull(d) { return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear(); }
function dateKey(d) { return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function isoToInput(d) { return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }

// --- BUILD DAY ROWS ---
function buildDays() {
  const container = document.getElementById('days-container');
  container.innerHTML = '';
  const weekInput = document.getElementById('inp-week').value;
  const mon = getMonday(weekInput || undefined);

  DAYS.forEach((day, i) => {
    const d = new Date(mon.getTime() + i * 86400000);
    const key = dateKey(d);
    const row = document.createElement('div');
    row.className = 'day-row';
    row.id = 'dayrow-'+i;
    row.innerHTML = `
      <div class="day-header" onclick="toggleDay(${i})">
        <div>
          <div class="day-name">${day}</div>
          <div class="day-date">${fmtDate(d)}</div>
        </div>
        <div class="day-hours empty" id="dh-${i}">—</div>
      </div>
      <div class="day-body" id="dbody-${i}">
        <div class="field">
          <label>Einsatzort</label>
          <input type="text" id="ort-${i}" placeholder="z.B. Estrel Berlin" oninput="calcDay(${i})"/>
        </div>
        <div class="time-pair">
          <div class="field">
            <label>Von</label>
            <input type="time" id="von-${i}" oninput="calcDay(${i})"/>
          </div>
          <div class="field">
            <label>Bis</label>
            <input type="time" id="bis-${i}" oninput="calcDay(${i})"/>
          </div>
        </div>
        <div class="field">
          <label>Pause (Minuten)</label>
          <input type="number" id="pause-${i}" placeholder="0" min="0" max="120" step="15" oninput="calcDay(${i})"/>
        </div>
        <div class="field">
          <label>Name AL</label>
          <input type="text" id="al-${i}" placeholder="Vorname Nachname"/>
        </div>
      </div>`;
    container.appendChild(row);
  });
  calcTotal();
}

function toggleDay(i) {
  const body = document.getElementById('dbody-'+i);
  body.classList.toggle('open');
}

function timeToMins(t) {
  if (!t) return null;
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}

function calcDay(i) {
  const von = timeToMins(document.getElementById('von-'+i).value);
  const bis = timeToMins(document.getElementById('bis-'+i).value);
  const pause = parseInt(document.getElementById('pause-'+i).value)||0;
  const el = document.getElementById('dh-'+i);
  if (von!=null && bis!=null && bis>von) {
    const h = Math.max(0,(bis-von-pause)/60);
    el.textContent = (h%1===0?h.toFixed(0):h.toFixed(2))+'h';
    el.className = 'day-hours';
  } else {
    el.textContent = '—';
    el.className = 'day-hours empty';
  }
  calcTotal();
}

function calcTotal() {
  let total = 0;
  DAYS.forEach((_,i) => {
    const von = timeToMins(document.getElementById('von-'+i)?.value);
    const bis = timeToMins(document.getElementById('bis-'+i)?.value);
    const pause = parseInt(document.getElementById('pause-'+i)?.value)||0;
    if (von!=null && bis!=null && bis>von) total += Math.max(0,(bis-von-pause)/60);
  });
  document.getElementById('total-hours').textContent = total%1===0?total.toFixed(0):total.toFixed(2);
}

// --- ABTEILUNG CHIPS ---
document.getElementById('chips-abt').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('#chips-abt .chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  selectedAbt = chip.dataset.val;
});

// --- WEEK DATE ---
document.getElementById('inp-week').addEventListener('change', buildDays);

// --- SIGNATURE ---
const canvas = document.getElementById('sigCanvas');
const ctx = canvas.getContext('2d');
let drawing = false, lastX, lastY;

function resizeSig() {
  const w = canvas.offsetWidth;
  canvas.width = w * window.devicePixelRatio;
  canvas.height = 120 * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#000';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [(src.clientX - rect.left), (src.clientY - rect.top)];
}

canvas.addEventListener('pointerdown', e => { drawing=true; [lastX,lastY]=getPos(e); e.preventDefault(); });
canvas.addEventListener('pointermove', e => {
  if (!drawing) return;
  e.preventDefault();
  const [x,y] = getPos(e);
  ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke();
  [lastX,lastY]=[x,y];
  sigData = canvas.toDataURL();
});
canvas.addEventListener('pointerup', () => { drawing=false; sigData=canvas.toDataURL(); });
canvas.addEventListener('pointercancel', () => { drawing=false; });

function clearSig() { ctx.clearRect(0,0,canvas.offsetWidth,120); sigData=null; }

// --- SAVE ---
function collectData() {
  const weekInput = document.getElementById('inp-week').value;
  const mon = getMonday(weekInput||undefined);
  const days = DAYS.map((day,i) => {
    const d = new Date(mon.getTime()+i*86400000);
    return {
      day, date: fmtDateFull(d),
      ort: document.getElementById('ort-'+i)?.value||'',
      von: document.getElementById('von-'+i)?.value||'',
      bis: document.getElementById('bis-'+i)?.value||'',
      pause: document.getElementById('pause-'+i)?.value||'0',
      al: document.getElementById('al-'+i)?.value||'',
    };
  });
  const total = document.getElementById('total-hours').textContent;
  return {
    name: document.getElementById('inp-name').value||'',
    abt: selectedAbt,
    weekStart: isoToInput(mon),
    weekLabel: fmtDateFull(mon)+' – '+fmtDateFull(new Date(mon.getTime()+6*86400000)),
    days, total,
    sig: sigData,
    saved: new Date().toISOString()
  };
}

function saveWeek() {
  const data = collectData();
  if (!data.name) { showToast('Bitte Namen eingeben'); return; }
  const key = 'woche_'+data.weekStart;
  const all = JSON.parse(localStorage.getItem('stundenzettel')||'{}');
  all[key] = data;
  localStorage.setItem('stundenzettel',JSON.stringify(all));
  showToast('✅ Gespeichert!');
}

// --- PDF EXPORT ---
async function exportPDF() {
  const { jsPDF } = window.jspdf;
  const data = collectData();
  const doc = new jsPDF({ orientation:'p', unit:'mm', format:'a4' });
  const W = 210, ml = 20, mr = 20, cw = W - ml - mr;

  // Header
  doc.setFont('helvetica','bold');
  doc.setFontSize(16);
  doc.text('Stundennachweis', ml, 20);
  doc.setFontSize(9);
  doc.setFont('helvetica','normal');
  doc.setTextColor(120);
  doc.text('Lübbert Event Interiors', ml, 26);
  doc.setTextColor(0);

  // Meta
  doc.setFontSize(10);
  doc.text('Name:', ml, 38);
  doc.setFont('helvetica','bold');
  doc.text(data.name||'—', ml+20, 38);
  doc.setFont('helvetica','normal');
  doc.text('Abteilung:', ml+80, 38);
  doc.setFont('helvetica','bold');
  doc.text(data.abt, ml+105, 38);
  doc.setFont('helvetica','normal');
  doc.text('Woche:', ml, 46);
  doc.setFont('helvetica','bold');
  doc.text(data.weekLabel, ml+20, 46);
  doc.setFont('helvetica','normal');

  // Table header
  let y = 56;
  const cols = [28, 40, 20, 20, 22, 14, 26];
  const headers = ['Tag / Datum','Einsatzort','Von','Bis','Pause','Std','Name AL'];
  doc.setFillColor(30,30,28);
  doc.rect(ml, y, cw, 8, 'F');
  doc.setTextColor(255);
  doc.setFontSize(8);
  doc.setFont('helvetica','bold');
  let cx = ml+2;
  headers.forEach((h,i) => { doc.text(h, cx, y+5.5); cx+=cols[i]; });
  doc.setTextColor(0);
  y += 8;

  // Rows
  data.days.forEach((d,idx) => {
    const von = timeToMins(d.von), bis = timeToMins(d.bis), pause=parseInt(d.pause)||0;
    let hrs = '';
    if (von!=null&&bis!=null&&bis>von) {
      const h=Math.max(0,(bis-von-pause)/60);
      hrs = (h%1===0?h.toFixed(0):h.toFixed(2));
    }
    if (idx%2===0) { doc.setFillColor(248,248,246); doc.rect(ml,y,cw,9,'F'); }
    doc.setFont('helvetica','bold'); doc.setFontSize(8);
    cx = ml+2;
    doc.text(d.day+' '+d.date, cx, y+5.5); cx+=cols[0];
    doc.setFont('helvetica','normal');
    doc.text(d.ort||'', cx, y+5.5); cx+=cols[1];
    doc.text(d.von||'—', cx, y+5.5); cx+=cols[2];
    doc.text(d.bis||'—', cx, y+5.5); cx+=cols[3];
    doc.text(d.pause?d.pause+' min':'—', cx, y+5.5); cx+=cols[4];
    doc.setFont('helvetica','bold');
    doc.text(hrs||'—', cx, y+5.5); cx+=cols[5];
    doc.setFont('helvetica','normal');
    doc.text(d.al||'', cx, y+5.5);
    doc.setDrawColor(220);
    doc.line(ml, y+9, ml+cw, y+9);
    y += 9;
  });

  // Total
  y += 6;
  doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text('Gesamtstunden:', ml, y);
  doc.setTextColor(24,95,165);
  doc.text(data.total+' h', ml+40, y);
  doc.setTextColor(0);

  // Signature
  if (data.sig) {
    y += 12;
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    doc.setTextColor(120);
    doc.text('Unterschrift AL:', ml, y);
    doc.setTextColor(0);
    try { doc.addImage(data.sig,'PNG',ml,y+3,60,22); } catch(e){}
    doc.setDrawColor(180);
    doc.line(ml, y+27, ml+70, y+27);
  }

  // Footer
  doc.setFont('helvetica','normal'); doc.setFontSize(8);
  doc.setTextColor(150);
  doc.text('Es werden nur Stunden angerechnet, die auf diesem Nachweis eingetragen und vom AL abgezeichnet sind.', ml, 285);
  doc.text('Einzureichen bis zum 20. Tag eines Monats.', ml, 290);

  doc.save('stundennachweis_'+data.weekStart+'.pdf');
  showToast('📄 PDF gespeichert!');
}

// --- HISTORY ---
function renderHistory() {
  const list = document.getElementById('history-list');
  const all = JSON.parse(localStorage.getItem('stundenzettel')||'{}');
  const keys = Object.keys(all).sort().reverse();
  if (!keys.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div>Noch keine Wochen gespeichert</div></div>';
    return;
  }
  list.innerHTML = keys.map(k => {
    const w = all[k];
    return `<div class="card" onclick="loadWeek('${k}')">
      <div class="card-row">
        <div>
          <div class="history-week">${w.weekLabel}</div>
          <div class="history-sub">${w.name} · <span class="badge">${w.abt}</span></div>
        </div>
        <div style="text-align:right">
          <div class="history-hours">${w.total}h</div>
          <button onclick="deleteWeek(event,'${k}')" style="font-size:11px;color:var(--danger);background:none;border:none;cursor:pointer;margin-top:4px">löschen</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function loadWeek(key) {
  const all = JSON.parse(localStorage.getItem('stundenzettel')||'{}');
  const w = all[key];
  if (!w) return;
  document.getElementById('inp-name').value = w.name;
  document.getElementById('inp-week').value = w.weekStart;
  selectedAbt = w.abt;
  document.querySelectorAll('#chips-abt .chip').forEach(c => {
    c.classList.toggle('active', c.dataset.val===w.abt);
  });
  buildDays();
  // fill in day data after buildDays
  setTimeout(() => {
    w.days.forEach((d,i) => {
      const setV = (id,v) => { const el=document.getElementById(id+'-'+i); if(el) el.value=v; };
      setV('ort',d.ort); setV('von',d.von); setV('bis',d.bis); setV('pause',d.pause); setV('al',d.al);
      if (d.von||d.bis) {
        document.getElementById('dbody-'+i).classList.add('open');
        calcDay(i);
      }
    });
    if (w.sig) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, canvas.offsetWidth, 120);
      img.src = w.sig;
      sigData = w.sig;
    }
    navigate('home');
    showToast('Woche geladen');
  }, 50);
}

function deleteWeek(e, key) {
  e.stopPropagation();
  if (!confirm('Diese Woche löschen?')) return;
  const all = JSON.parse(localStorage.getItem('stundenzettel')||'{}');
  delete all[key];
  localStorage.setItem('stundenzettel',JSON.stringify(all));
  renderHistory();
  showToast('🗑️ Gelöscht');
}

// --- TOAST ---
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// --- INIT ---
function init() {
  const mon = getMonday();
  document.getElementById('inp-week').value = isoToInput(mon);
  const saved = localStorage.getItem('stundenzettel_name');
  if (saved) document.getElementById('inp-name').value = saved;
  document.getElementById('inp-name').addEventListener('blur', e => {
    localStorage.setItem('stundenzettel_name', e.target.value);
  });
  resizeSig();
  buildDays();
}

window.addEventListener('resize', resizeSig);
init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
