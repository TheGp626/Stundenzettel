<!DOCTYPE html>
<html lang="de" data-theme="auto">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Stundenzettel"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>Stundennachweis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#e8e7e3;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --accent:#185FA5;--accent-bg:#E6F1FB;--accent-text:#185FA5;
  --danger:#A32D2D;--radius:10px;--radius-lg:14px;
}
[data-theme="dark"] {
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
  --text:#f0efe9;--text2:#a0a09a;--text3:#6a6a65;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  --accent:#4a90d9;--accent-bg:#0c2a45;--accent-text:#7ab8ef;
}
@media(prefers-color-scheme:dark){
  [data-theme="auto"]{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#f0efe9;--text2:#a0a09a;--text3:#6a6a65;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
    --accent:#4a90d9;--accent-bg:#0c2a45;--accent-text:#7ab8ef;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
.app{display:flex;flex-direction:column;height:100%}
.page{flex:1;overflow-y:auto;padding:0 16px 32px;display:none}
.page.active{display:block}

/* HEADER */
.page-header{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 0 4px}
.page-header h1{font-size:22px;font-weight:600}
.page-header .subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.theme-btn{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 10px;cursor:pointer;font-size:18px;color:var(--text2);flex-shrink:0;margin-top:2px}
.theme-btn:active{background:var(--bg2)}

/* NAV */
.bottom-nav{display:flex;border-top:0.5px solid var(--border);background:var(--bg);padding:8px 0 max(8px,env(safe-area-inset-bottom));flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;color:var(--text3);font-size:10px;padding:4px;cursor:pointer}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:22px;line-height:1}

/* FORM */
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin:18px 0 8px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.field input[type=text],.field input[type=week]{width:100%;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:15px;-webkit-appearance:none;appearance:none}
.field input:focus{outline:2px solid var(--accent);outline-offset:-1px}
.time-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* Force 24h time display */
input[type=time]{width:100%;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:15px;-webkit-appearance:none;appearance:none;-webkit-text-fill-color:var(--text)}
input[type=time]::-webkit-datetime-edit-ampm-field{display:none}
input[type=time]::-webkit-clear-button{display:none}
input[type=time]:focus{outline:2px solid var(--accent);outline-offset:-1px}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:7px 14px;border:0.5px solid var(--border2);border-radius:99px;font-size:13px;cursor:pointer;color:var(--text2);background:var(--bg);user-select:none}
.chip.active{border-color:var(--accent);background:var(--accent-bg);color:var(--accent-text);font-weight:500}

/* DAY ROWS */
.day-row{background:var(--bg2);border-radius:var(--radius-lg);margin-bottom:10px;border:0.5px solid var(--border);overflow:hidden}
.day-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;user-select:none}
.day-name{font-weight:600;font-size:15px}
.day-date{font-size:12px;color:var(--text2);margin-top:1px}
.day-hours{font-size:14px;font-weight:600;color:var(--accent);text-align:right}
.day-hours.empty{color:var(--text3);font-weight:400}
.day-body{padding:0 16px 16px;border-top:0.5px solid var(--border);display:none}
.day-body.open{display:block}

/* SHIFTS */
.shift-block{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;margin-top:12px;position:relative}
.shift-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:10px}
.shift-remove{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;line-height:1;padding:0}
.shift-remove:active{color:var(--danger)}
.shift-block .field{margin-bottom:8px}
.shift-block .field:last-child{margin-bottom:0}
.pause-badge{display:inline-block;font-size:12px;color:var(--text2);background:var(--bg3);border-radius:99px;padding:4px 10px}
.pause-badge.auto{color:var(--accent-text);background:var(--accent-bg)}
.add-shift-btn{display:flex;align-items:center;gap:6px;margin-top:10px;padding:8px 12px;border:0.5px dashed var(--border2);border-radius:var(--radius);background:none;color:var(--text2);font-size:13px;cursor:pointer;width:100%}
.add-shift-btn:active{background:var(--bg3)}
.day-al{margin-top:12px}

/* SIG */
.sig-wrap{position:relative;border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;background:var(--bg);height:110px}
.sig-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:manipulation;pointer-events:none;display:block}
.sig-placeholder{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;color:var(--text3);pointer-events:none;white-space:nowrap}
.sig-clear{position:absolute;top:8px;right:8px;font-size:12px;color:var(--text3);background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;padding:3px 8px;cursor:pointer;z-index:2}
.sig-open{position:absolute;bottom:8px;right:8px;font-size:12px;color:#fff;background:var(--accent);border:0;border-radius:6px;padding:5px 8px;cursor:pointer;z-index:2}
.sig-full-btn{margin-top:8px;width:100%;padding:9px 10px;border:0.5px solid var(--accent);border-radius:8px;background:var(--accent-bg);color:var(--accent-text);font-size:13px;font-weight:600;cursor:pointer}
.sig-full-btn:active{opacity:.85}

/* TOTAL */
.total-bar{background:var(--accent-bg);border-radius:var(--radius-lg);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin:20px 0 16px;border:0.5px solid var(--accent)}
.total-bar .lbl{font-size:13px;color:var(--accent-text)}
.total-bar .val{font-size:28px;font-weight:700;color:var(--accent)}
.total-bar .unit{font-size:14px;color:var(--accent-text);margin-left:4px}

/* BUTTONS */
.btn{display:block;width:100%;padding:13px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:15px;font-weight:500;cursor:pointer;text-align:center;margin-bottom:10px}
.btn:active{background:var(--bg3)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:active{opacity:.85}

/* HISTORY */
.card{background:var(--bg2);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px;border:0.5px solid var(--border);cursor:pointer}
.card:active{background:var(--bg3)}
.history-week{font-size:14px;font-weight:600}
.history-sub{font-size:12px;color:var(--text2);margin-top:3px}
.history-hours{font-size:20px;font-weight:700;color:var(--accent)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;background:var(--bg3);color:var(--text2)}
.empty-state{text-align:center;padding:48px 16px;color:var(--text3);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:12px}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:99px;font-size:13px;font-weight:500;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SIGNATURE PAD MODAL */
.sig-modal{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;z-index:1200;align-items:center;justify-content:center;padding:14px}
.sig-modal.open{display:flex}
.sig-modal-inner{width:min(980px,100%);background:var(--bg);border-radius:14px;padding:12px;border:0.5px solid var(--border2)}
.sig-modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sig-modal-title{font-size:14px;font-weight:600}
.sig-modal-sub{font-size:12px;color:var(--text2)}
.sig-pad-wrap{margin-top:8px;border:0.5px solid var(--border2);border-radius:10px;overflow:hidden;background:#fff;height:min(48vh,320px)}
.sig-pad-wrap canvas{width:100%;height:100%;display:block;touch-action:none}
.sig-actions{display:flex;gap:8px;margin-top:10px}
.sig-actions .btn{margin:0}
</style>
</head>
<body>
<div class="app">

<!-- ERFASSEN -->
<div class="page active" id="page-home">
  <div class="page-header">
    <div>
      <h1>Stundennachweis</h1>
      <div class="subtitle">Lübbert Event Interiors</div>
    </div>
    <button class="theme-btn" id="theme-btn" onclick="cycleTheme()" title="Theme wechseln">🌓</button>
  </div>

  <div class="field" style="margin-top:16px">
    <label>Name</label>
    <input type="text" id="inp-name" placeholder="Vollständiger Name"/>
  </div>
  <div class="field">
    <label>Kalenderwoche</label>
    <input type="week" id="inp-week"/>
  </div>

  <div class="section-label">Abteilung</div>
  <div class="chips" id="chips-abt">
    <div class="chip" data-val="AL (Aufbauleitung)">AL</div>
    <div class="chip active" data-val="MA für Auf-/Abbau">MA</div>
    <div class="chip" data-val="Floristik">Floristik</div>
    <div class="chip" data-val="Lager">Lager</div>
    <div class="chip" data-val="Stoffe">Stoffe</div>
    <div class="chip" data-val="Tischlerei">Tischlerei</div>
  </div>

  <div class="section-label">Arbeitstage</div>
  <div id="days-container"></div>

  <div class="total-bar">
    <span class="lbl">Gesamtstunden</span>
    <div><span class="val" id="total-hours">0</span><span class="unit">h</span></div>
  </div>
  <button class="btn primary" onclick="saveWeek()">💾 Woche speichern</button>
  <button class="btn" onclick="exportPDF()">📄 Als PDF exportieren</button>
</div>

<!-- VERLAUF -->
<div class="page" id="page-history">
  <div class="page-header">
    <div>
      <h1>Verlauf</h1>
      <div class="subtitle">Gespeicherte Wochen</div>
    </div>
    <button class="theme-btn" onclick="cycleTheme()" title="Theme wechseln">🌓</button>
  </div>
  <div id="history-list"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="navigate('home')">
    <span class="nav-icon">✏️</span><span>Erfassen</span>
  </button>
  <button class="nav-btn" id="nav-history" onclick="navigate('history')">
    <span class="nav-icon">📋</span><span>Verlauf</span>
  </button>
</nav>
</div>
<div class="toast" id="toast"></div>
<div class="sig-modal" id="sig-modal">
  <div class="sig-modal-inner">
    <div class="sig-modal-head">
      <div>
        <div class="sig-modal-title">Unterschrift erfassen</div>
        <div class="sig-modal-sub" id="sig-modal-sub">Querformat empfohlen</div>
      </div>
      <button class="theme-btn" onclick="closeSigModal()" title="Schließen">✕</button>
    </div>
    <div class="sig-pad-wrap">
      <canvas id="sig-modal-canvas"></canvas>
    </div>
    <div class="sig-actions">
      <button class="btn" onclick="clearSigModal()">Löschen</button>
      <button class="btn" onclick="closeSigModal()">Abbrechen</button>
      <button class="btn primary" onclick="saveSigModal()">Übernehmen</button>
    </div>
  </div>
</div>

<script>
var DAYS = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
var selectedAbt = 'MA für Auf-/Abbau';
// sigCanvases[dayIndex][shiftIndex]
var sigCanvases = {}, sigDrawing = {}, sigLast = {}, sigData = {};
// shiftCounts[dayIndex] = number of shifts
var shiftCounts = {};

// ---- THEME ----
var THEMES = ['auto','light','dark'];
var ICONS  = {'auto':'🌓','light':'☀️','dark':'🌙'};
var currentTheme = localStorage.getItem('theme') || 'auto';
applyTheme(currentTheme);

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('.theme-btn').forEach(function(b){ b.textContent = ICONS[t]; });
}
function cycleTheme() {
  var idx = (THEMES.indexOf(currentTheme) + 1) % THEMES.length;
  currentTheme = THEMES[idx];
  localStorage.setItem('theme', currentTheme);
  applyTheme(currentTheme);
}

// ---- NAVIGATION ----
function navigate(page) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav-'+page).classList.add('active');
  if (page === 'history') renderHistory();
}

// ---- DATE HELPERS ----
function pad(n){ return String(n).padStart(2,'0'); }
function fmtDate(d){ return pad(d.getDate())+'.'+pad(d.getMonth()+1); }
function fmtDateFull(d){ return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear(); }

function currentWeekVal() {
  var d = new Date();
  var thu = new Date(d); thu.setDate(d.getDate()+(4-(d.getDay()||7)));
  var year = thu.getFullYear();
  var jan1 = new Date(year,0,1);
  var week = Math.ceil(((thu-jan1)/86400000+1)/7);
  return year+'-W'+pad(week);
}

function getMondayFromWeekVal(val) {
  var parts = val.split('-W');
  var year = parseInt(parts[0]), week = parseInt(parts[1]);
  var jan4 = new Date(year,0,4);
  var dow = jan4.getDay()||7;
  var mon = new Date(jan4);
  mon.setDate(jan4.getDate()-(dow-1)+(week-1)*7);
  return mon;
}

function weekLabelFromVal(val) {
  if (!val) return '';
  var parts = val.split('-W');
  var mon = getMondayFromWeekVal(val);
  var sun = new Date(mon.getTime()+6*86400000);
  return 'KW '+parseInt(parts[1])+'  ·  '+fmtDateFull(mon)+' – '+fmtDateFull(sun);
}

function timeToMins(t) {
  if (!t) return null;
  var p = t.split(':'); return parseInt(p[0])*60+parseInt(p[1]);
}

function autoPause(rawMins) {
  if (rawMins >= 540) return 45;
  if (rawMins >= 360) return 30;
  return 0;
}

// ---- BUILD DAY ROWS ----
function buildDays() {
  var container = document.getElementById('days-container');
  container.innerHTML = '';
  sigCanvases = {}; sigDrawing = {}; sigLast = {}; sigData = {};
  shiftCounts = {};

  var val = document.getElementById('inp-week').value || currentWeekVal();
  var mon = getMondayFromWeekVal(val);

  for (var i = 0; i < DAYS.length; i++) {
    (function(i){
      var d = new Date(mon.getTime()+i*86400000);
      shiftCounts[i] = 1;
      sigData[i] = {};

      var row = document.createElement('div');
      row.className = 'day-row'; row.id = 'dayrow-'+i;
      row.innerHTML =
        '<div class="day-header" onclick="toggleDay('+i+')">'
          +'<div><div class="day-name">'+DAYS[i]+'</div>'
          +'<div class="day-date">'+fmtDate(d)+'</div></div>'
          +'<div class="day-hours empty" id="dh-'+i+'">—</div>'
        +'</div>'
        +'<div class="day-body" id="dbody-'+i+'">'
          +'<div id="shifts-'+i+'"></div>'
          +'<button class="add-shift-btn" onclick="addShift('+i+')">＋ Schicht hinzufügen</button>'
          +'<div class="day-al">'
            +'<div class="field"><label>Ort / Venue</label>'
              +'<input type="text" id="ort-'+i+'" placeholder="Einsatzort"/></div>'
            +'<div class="field"><label>Name AL</label>'
              +'<input type="text" id="al-'+i+'" placeholder="Vorname Nachname"/></div>'
          +'</div>'
        +'</div>';
      container.appendChild(row);

      // render first shift
      renderShift(i, 0);
    })(i);
  }

  setTimeout(function(){
    for (var i=0; i<DAYS.length; i++) initSig(i);
  }, 0);
  calcTotal();
}

function renderShift(dayIdx, shiftIdx) {
  var container = document.getElementById('shifts-'+dayIdx);
  var block = document.createElement('div');
  block.className = 'shift-block';
  block.id = 'shift-'+dayIdx+'-'+shiftIdx;

  var removeBtn = shiftIdx > 0
    ? '<button class="shift-remove" onclick="removeShift('+dayIdx+','+shiftIdx+')" title="Schicht entfernen">×</button>'
    : '';

  block.innerHTML =
    '<div class="shift-label">Schicht '+(shiftIdx+1)+removeBtn+'</div>'
    +'<div class="time-pair">'
      +'<div class="field"><label>Von</label>'
        +'<input type="time" id="von-'+dayIdx+'-'+shiftIdx+'" oninput="calcDay('+dayIdx+')"/></div>'
      +'<div class="field"><label>Bis</label>'
        +'<input type="time" id="bis-'+dayIdx+'-'+shiftIdx+'" oninput="calcDay('+dayIdx+')"/></div>'
    +'</div>'
    +'<div class="field"><label>Pause</label>'
      +'<div class="pause-badge" id="pbadge-'+dayIdx+'-'+shiftIdx+'">wird automatisch berechnet</div>'
      +'<input type="hidden" id="pause-'+dayIdx+'-'+shiftIdx+'" value="0"/></div>'
    +'<div class="field"><label>Unterschrift AL</label>'
      +'<div class="sig-wrap" data-day="'+dayIdx+'" data-shift="'+shiftIdx+'" onclick="openSignaturePad('+dayIdx+','+shiftIdx+')">'
        +'<canvas id="sigc-'+dayIdx+'-'+shiftIdx+'"></canvas>'
        +'<div class="sig-placeholder" id="sigph-'+dayIdx+'-'+shiftIdx+'">Tippen für Unterschrift (Vollbild)</div>'
        +'<button class="sig-clear" data-day="'+dayIdx+'" data-shift="'+shiftIdx+'" onclick="event.stopPropagation();clearShiftSig('+dayIdx+','+shiftIdx+')">löschen</button>'+'<button class="sig-open" onclick="event.stopPropagation();openSignaturePad('+dayIdx+','+shiftIdx+')">Vollbild</button>'+'<button class="sig-full-btn" onclick="openSignaturePad('+dayIdx+','+shiftIdx+')">🖊️ Vollbild-Unterschrift öffnen</button>'
      +'</div></div>';

  container.appendChild(block);
  setTimeout(function(){ initShiftSig(dayIdx, shiftIdx); }, 0);
}

function addShift(dayIdx) {
  var idx = shiftCounts[dayIdx];
  shiftCounts[dayIdx]++;
  renderShift(dayIdx, idx);
  calcDay(dayIdx);
}

function removeShift(dayIdx, shiftIdx) {
  var existing = [];
  for (var s = 0; s < shiftCounts[dayIdx]; s++) {
    if (s === shiftIdx) continue;
    var key = dayIdx+'-'+s;
    var vonEl = document.getElementById('von-'+key);
    var bisEl = document.getElementById('bis-'+key);
    var pauseEl = document.getElementById('pause-'+key);
    if (!vonEl || !bisEl) continue;
    existing.push({
      von: vonEl.value || '',
      bis: bisEl.value || '',
      pause: (pauseEl && pauseEl.value) || '0',
      sig: shiftSigData[key] || null
    });
  }

  var container = document.getElementById('shifts-'+dayIdx);
  container.innerHTML = '';
  shiftCounts[dayIdx] = Math.max(existing.length, 1);
  for (var newIdx = 0; newIdx < shiftCounts[dayIdx]; newIdx++) renderShift(dayIdx, newIdx);

  setTimeout(function(){
    existing.forEach(function(sh, newIdx){
      var key = dayIdx+'-'+newIdx;
      var vEl = document.getElementById('von-'+key); if (vEl) vEl.value = sh.von;
      var bEl = document.getElementById('bis-'+key); if (bEl) bEl.value = sh.bis;
      var pEl = document.getElementById('pause-'+key); if (pEl) pEl.value = sh.pause;
      if (sh.sig) {
        shiftSigData[key] = sh.sig;
        var sc = shiftSigCanvases[key];
        if (sc) {
          var img = new Image();
          img.onload = function(){ sc.ctx.drawImage(img,0,0,sc.w,sc.h); };
          img.src = sh.sig;
        }
        var ph = document.getElementById('sigph-'+key); if (ph) ph.style.display = 'none';
      }
    });
    calcDay(dayIdx);
  }, 50);
}

function toggleDay(i) {
  var body = document.getElementById('dbody-'+i);
  var wasOpen = body.classList.contains('open');
  body.classList.toggle('open');
  if (!wasOpen) setTimeout(function(){ initSig(i); }, 0);
}

// ---- CALC ----
function calcDay(dayIdx) {
  var totalNet = 0;
  var summaries = [];

  for (var s = 0; s < shiftCounts[dayIdx]; s++) {
    var vonEl = document.getElementById('von-'+dayIdx+'-'+s);
    var bisEl = document.getElementById('bis-'+dayIdx+'-'+s);
    var badge = document.getElementById('pbadge-'+dayIdx+'-'+s);
    var pauseEl = document.getElementById('pause-'+dayIdx+'-'+s);
    if (!vonEl || !bisEl) continue;

    var von = timeToMins(vonEl.value);
    var bis = timeToMins(bisEl.value);

    if (von !== null && bis !== null && bis > von) {
      var raw = bis - von;
      var pause = autoPause(raw);
      var net = Math.max(180, raw - pause);  // minimum 3h per shift
      pauseEl.value = pause;
      badge.textContent = pause > 0 ? pause+' min (automatisch)' : 'keine Pause';
      badge.className = 'pause-badge' + (pause > 0 ? ' auto' : '');
      totalNet += net;
      summaries.push((net/60 % 1 === 0 ? (net/60).toFixed(0) : (net/60).toFixed(2))+'h');
    } else {
      if (pauseEl) pauseEl.value = 0;
      if (badge) { badge.textContent = 'wird automatisch berechnet'; badge.className = 'pause-badge'; }
    }
  }

  var el = document.getElementById('dh-'+dayIdx);
  if (totalNet > 0) {
    var h = totalNet / 60;
    var hStr = h % 1 === 0 ? h.toFixed(0) : h.toFixed(2);
    el.textContent = summaries.length > 1 ? hStr+'h ('+summaries.join(' + ')+')' : hStr+'h';
    el.className = 'day-hours';
  } else {
    el.textContent = '—';
    el.className = 'day-hours empty';
  }
  calcTotal();
}

function calcTotal() {
  var total = 0;
  for (var i = 0; i < DAYS.length; i++) {
    for (var s = 0; s < (shiftCounts[i]||1); s++) {
      var von = timeToMins((document.getElementById('von-'+i+'-'+s)||{}).value);
      var bis = timeToMins((document.getElementById('bis-'+i+'-'+s)||{}).value);
      var pause = parseInt((document.getElementById('pause-'+i+'-'+s)||{value:'0'}).value)||0;
      if (von !== null && bis !== null && bis > von) total += Math.max(3, (bis-von-pause)/60);
    }
  }
  var t = document.getElementById('total-hours');
  t.textContent = total % 1 === 0 ? total.toFixed(0) : total.toFixed(2);
}

// ---- SIGNATURE (day-level, kept for compat) ----
var shiftSigCanvases = {}, shiftSigDrawing = {}, shiftSigLast = {}, shiftSigData = {};
var sigModalState = { key:null, drawing:false, last:null, hasInk:false };

function initShiftSig(dayIdx, shiftIdx) {
  var key = dayIdx+'-'+shiftIdx;
  var canvas = document.getElementById('sigc-'+key);
  if (!canvas || (shiftSigCanvases[key] && shiftSigCanvases[key]._ready)) return;

  var dpr = window.devicePixelRatio||1;
  var pw = canvas.parentElement.offsetWidth||300;
  var ph = 110;
  canvas.width = pw*dpr; canvas.height = ph*dpr;
  canvas.style.width = pw+'px'; canvas.style.height = ph+'px';

  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#1a1a18';
  ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  shiftSigCanvases[key] = {canvas:canvas, ctx:ctx, w:pw, h:ph, _ready:true};

  redrawShiftSig(key);
}

function redrawShiftSig(key) {
  var sc = shiftSigCanvases[key];
  if (!sc) return;
  sc.ctx.clearRect(0,0,sc.w,sc.h);
  if (shiftSigData[key]) {
    var img = new Image();
    img.onload = function(){ sc.ctx.drawImage(img,0,0,sc.w,sc.h); };
    img.src = shiftSigData[key];
  }
  var ph = document.getElementById('sigph-'+key);
  if (ph) ph.style.display = shiftSigData[key] ? 'none' : '';
}

function initSigModalCanvas() {
  var c = document.getElementById('sig-modal-canvas');
  var dpr = window.devicePixelRatio||1;
  var w = c.parentElement.clientWidth;
  var h = c.parentElement.clientHeight;
  c.width = w*dpr; c.height = h*dpr;
  c.style.width = w+'px'; c.style.height = h+'px';
  var ctx = c.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr,dpr);
  ctx.strokeStyle = '#1a1a18';
  ctx.lineWidth = 2.8; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  return {canvas:c,ctx:ctx,w:w,h:h};
}

function openSignaturePad(dayIdx, shiftIdx) {
  var key = dayIdx+'-'+shiftIdx;
  sigModalState.key = key;
  sigModalState.drawing = false;
  sigModalState.last = null;
  sigModalState.hasInk = !!shiftSigData[key];

  var sub = document.getElementById('sig-modal-sub');
  if (sub) sub.textContent = DAYS[dayIdx]+' · Schicht '+(shiftIdx+1)+' · Querformat empfohlen';

  var modal = document.getElementById('sig-modal');
  modal.classList.add('open');

  if (modal.requestFullscreen) { try { modal.requestFullscreen(); } catch(_) {} }
  if (screen.orientation && screen.orientation.lock) { try { screen.orientation.lock('landscape'); } catch(_) {} }

  var pad = initSigModalCanvas();
  if (shiftSigData[key]) {
    var img = new Image();
    img.onload = function(){ pad.ctx.drawImage(img,0,0,pad.w,pad.h); };
    img.src = shiftSigData[key];
  }
}

function sigModalPos(e, c) {
  var r = c.getBoundingClientRect();
  return [e.clientX-r.left, e.clientY-r.top];
}

(function bindSigModalEvents(){
  var c = document.getElementById('sig-modal-canvas');
  if (!c) return;

  c.addEventListener('pointerdown', function(e){
    sigModalState.drawing = true;
    sigModalState.last = sigModalPos(e,c);
    if (c.setPointerCapture) c.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  c.addEventListener('pointermove', function(e){
    if (!sigModalState.drawing) return;
    var ctx = c.getContext('2d');
    var p = sigModalPos(e,c), l = sigModalState.last;
    ctx.beginPath(); ctx.moveTo(l[0],l[1]); ctx.lineTo(p[0],p[1]); ctx.stroke();
    sigModalState.last = p;
    sigModalState.hasInk = true;
    e.preventDefault();
  });
  c.addEventListener('pointerup', function(e){
    sigModalState.drawing = false;
    if (c.releasePointerCapture) { try { c.releasePointerCapture(e.pointerId); } catch(_) {} }
  });
  c.addEventListener('pointercancel', function(){ sigModalState.drawing = false; });
})();

function clearSigModal() {
  var c = document.getElementById('sig-modal-canvas');
  var ctx = c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  sigModalState.hasInk = false;
}

function saveSigModal() {
  var key = sigModalState.key;
  if (!key) return closeSigModal();
  var c = document.getElementById('sig-modal-canvas');
  shiftSigData[key] = sigModalState.hasInk ? c.toDataURL() : null;
  redrawShiftSig(key);
  closeSigModal();
}

function closeSigModal() {
  var modal = document.getElementById('sig-modal');
  modal.classList.remove('open');
  if (document.fullscreenElement && document.exitFullscreen) { document.exitFullscreen().catch(function(){}); }
  if (screen.orientation && screen.orientation.unlock) { try { screen.orientation.unlock(); } catch(_) {} }
  sigModalState.key = null;
}

function clearShiftSig(dayIdx, shiftIdx) {
  var key = dayIdx+'-'+shiftIdx;
  shiftSigData[key] = null;
  redrawShiftSig(key);
}

// ---- COLLECT ----
function collectData() {
  var val = document.getElementById('inp-week').value || currentWeekVal();
  var mon = getMondayFromWeekVal(val);
  var days = DAYS.map(function(day, i){
    var d = new Date(mon.getTime()+i*86400000);
    var shifts = [];
    for (var s=0; s<(shiftCounts[i]||1); s++) {
      var key = i+'-'+s;
      shifts.push({
        von:(document.getElementById('von-'+key)||{}).value||'',
        bis:(document.getElementById('bis-'+key)||{}).value||'',
        pause:(document.getElementById('pause-'+key)||{value:'0'}).value||'0',
        sig:shiftSigData[key]||null
      });
    }
    return {
      day:day, date:fmtDateFull(d),
      ort:(document.getElementById('ort-'+i)||{}).value||'',
      shifts:shifts,
      al:(document.getElementById('al-'+i)||{}).value||''
    };
  });
  return {
    name:document.getElementById('inp-name').value||'',
    abt:selectedAbt, weekStart:val, weekLabel:weekLabelFromVal(val),
    days:days, total:document.getElementById('total-hours').textContent,
    saved:new Date().toISOString()
  };
}

function saveWeek() {
  var data = collectData();
  if (!data.name){ showToast('Bitte Namen eingeben'); return; }
  var all = JSON.parse(localStorage.getItem('stundenzettel')||'{}');
  all[data.weekStart] = data;
  localStorage.setItem('stundenzettel', JSON.stringify(all));
  showToast('✅ Gespeichert!');
}

// ---- PDF ----
async function exportPDF() {
  var jsPDF = window.jspdf.jsPDF;
  var data = collectData();
  var doc = new jsPDF({orientation:'p',unit:'mm',format:'a4'});
  var ml=20, cw=170;

  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.text('Stundennachweis',ml,20);
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(120);
  doc.text('Lübbert Event Interiors',ml,26); doc.setTextColor(0);

  doc.setFontSize(10);
  doc.text('Name:',ml,38); doc.setFont('helvetica','bold'); doc.text(data.name||'—',ml+18,38);
  doc.setFont('helvetica','normal'); doc.text('Abteilung:',ml+80,38);
  doc.setFont('helvetica','bold'); doc.text(data.abt,ml+103,38);
  doc.setFont('helvetica','normal'); doc.text('Woche:',ml,46);
  doc.setFont('helvetica','bold'); doc.text(data.weekLabel,ml+18,46);

  var y=56;
  var cols=[28,22,16,16,18,10,28,32];
  var headers=['Tag / Datum','Einsatzort','Von','Bis','Pause','Std','Name AL','Unterschrift AL'];
  doc.setFillColor(30,30,28); doc.rect(ml,y,cw,8,'F');
  doc.setTextColor(255); doc.setFontSize(8); doc.setFont('helvetica','bold');
  var cx=ml+2;
  headers.forEach(function(h,i){ doc.text(h,cx,y+5.5); cx+=cols[i]; });
  doc.setTextColor(0); y+=8;

  for (var idx=0; idx<data.days.length; idx++) {
    var dd = data.days[idx];
    var activeShifts = dd.shifts.filter(function(sh){ return sh.von && sh.bis; });
    if (!activeShifts.length) continue;

    var dayNet = 0;
    activeShifts.forEach(function(sh){
      var v=timeToMins(sh.von), b=timeToMins(sh.bis), p=parseInt(sh.pause)||0;
      if(v!==null&&b!==null&&b>v) dayNet+=Math.max(3,(b-v-p)/60);
    });
    var hrsStr = dayNet%1===0 ? dayNet.toFixed(0) : dayNet.toFixed(2);

    var firstSig = null;
    for (var si=0; si<activeShifts.length; si++) { if(activeShifts[si].sig){ firstSig=activeShifts[si].sig; break; } }

    var dayRows = activeShifts.length;
    var dayHeight = dayRows * 10;
    if (y + dayHeight > 268) {
      doc.addPage();
      y = 20;
      doc.setFillColor(30,30,28); doc.rect(ml,y,cw,8,'F');
      doc.setTextColor(255); doc.setFontSize(8); doc.setFont('helvetica','bold');
      var hcx=ml+2;
      headers.forEach(function(h,i){ doc.text(h,hcx,y+5.5); hcx+=cols[i]; });
      doc.setTextColor(0); y+=8;
    }

    var rowStartY = y;
    for (var row = 0; row < dayRows; row++) {
      if (idx%2===0){ doc.setFillColor(248,248,246); doc.rect(ml,y,cw,10,'F'); }
      cx = ml+2;
      if (row === 0) {
        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.text(dd.day+' '+dd.date,cx,y+5.5);
      }
      cx += cols[0];
      doc.setFont('helvetica','normal');
      if (row === 0) doc.text(dd.ort||'',cx,y+5.5);
      cx += cols[1];
      doc.text(activeShifts[row].von+' – '+activeShifts[row].bis,cx,y+5.5); cx += cols[2]+cols[3];
      doc.text(parseInt(activeShifts[row].pause)>0 ? activeShifts[row].pause+' min' : '—',cx,y+5.5); cx += cols[4];
      if (row === 0) {
        doc.setFont('helvetica','bold'); doc.text(hrsStr+'h',cx,y+5.5);
      }
      cx += cols[5];
      if (row === 0) {
        doc.setFont('helvetica','normal'); doc.text(dd.al||'',cx,y+5.5);
      }
      cx += cols[6];
      if (row === 0 && firstSig) {
        try { doc.addImage(firstSig,'PNG',cx,y+1,28,8); } catch(e) {}
      }
      doc.setDrawColor(220); doc.line(ml,y+10,ml+cw,y+10);
      y += 10;
    }
  }

  y+=8; doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text('Gesamtstunden:',ml,y);
  doc.setTextColor(24,95,165); doc.text(data.total+' h',ml+38,y); doc.setTextColor(0);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(150);
  doc.text('Es werden nur Stunden angerechnet, die auf diesem Nachweis eingetragen und vom AL abgezeichnet sind.',ml,285);
  doc.text('Einzureichen bis zum 20. Tag eines Monats.',ml,290);
  doc.save('stundennachweis_'+data.weekStart+'.pdf');
  showToast('📄 PDF gespeichert!');
}

// ---- HISTORY ----
function renderHistory() {
  var list = document.getElementById('history-list');
  var all = JSON.parse(localStorage.getItem('stundenzettel')||'{}');
  var keys = Object.keys(all).sort().reverse();
  if (!keys.length) {
    list.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div>Noch keine Wochen gespeichert</div></div>';
    return;
  }
  list.innerHTML = keys.map(function(k){
    var w=all[k];
    return '<div class="card" onclick="loadWeek(\''+k+'\')"><div style="display:flex;justify-content:space-between;align-items:center">'
      +'<div><div class="history-week">'+w.weekLabel+'</div>'
      +'<div class="history-sub">'+w.name+' · <span class="badge">'+w.abt+'</span></div></div>'
      +'<div style="text-align:right"><div class="history-hours">'+w.total+'h</div>'
      +'<button onclick="deleteWeek(event,\''+k+'\')" style="font-size:11px;color:var(--danger);background:none;border:none;cursor:pointer;margin-top:4px">löschen</button>'
      +'</div></div></div>';
  }).join('');
}

function loadWeek(key) {
  var all = JSON.parse(localStorage.getItem('stundenzettel')||'{}');
  var w = all[key]; if(!w) return;
  document.getElementById('inp-name').value = w.name;
  document.getElementById('inp-week').value = w.weekStart;
  selectedAbt = w.abt;
  document.querySelectorAll('#chips-abt .chip').forEach(function(c){ c.classList.toggle('active',c.dataset.val===w.abt); });
  buildDays();
  setTimeout(function(){
    w.days.forEach(function(d,i){
      var ortEl = document.getElementById('ort-'+i); if(ortEl) ortEl.value=d.ort||'';
      var alEl = document.getElementById('al-'+i); if(alEl) alEl.value=d.al||'';

      var shifts = d.shifts || [{von:d.von||'',bis:d.bis||'',pause:d.pause||'0',sig:d.sig||null}];
      for (var s=1; s<shifts.length; s++) addShift(i);

      shifts.forEach(function(sh,s){
        var vEl=document.getElementById('von-'+i+'-'+s); if(vEl) vEl.value=sh.von||'';
        var bEl=document.getElementById('bis-'+i+'-'+s); if(bEl) bEl.value=sh.bis||'';
        if (sh.sig) {
          var key2=i+'-'+s;
          shiftSigData[key2]=sh.sig;
          redrawShiftSig(key2);
        }
      });

      if (shifts.some(function(sh){return sh.von||sh.bis;})) {
        document.getElementById('dbody-'+i).classList.add('open');
        calcDay(i);
      }
    });
    navigate('home'); showToast('Woche geladen');
  },80);
}

function deleteWeek(e,key) {
  e.stopPropagation();
  if(!confirm('Diese Woche löschen?')) return;
  var all=JSON.parse(localStorage.getItem('stundenzettel')||'{}');
  delete all[key];
  localStorage.setItem('stundenzettel',JSON.stringify(all));
  renderHistory(); showToast('🗑️ Gelöscht');
}

function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}
